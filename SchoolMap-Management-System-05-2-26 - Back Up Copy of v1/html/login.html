<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>SchoolMap — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <script>
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost/SCHOOL%20MAPS/REPO/School-Map-Management-System/SchoolMap-Management-System-05-2-26%20-%20Back%20Up%20Copy%20of%20v1/html/login.html');
    }
  </script>
  <!-- ===================================================
       PAGE: LOGIN
  ==================================================== -->
  <div id="page-login" class="page">
    <div class="auth-page">
      <button class="logo-btn" onclick="window.location.href = 'index.html'" style="margin-bottom: 32px">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white"
            stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
          </svg>
        </div>
        <span class="logo-text">SchoolMap</span>
      </button>
      <div class="wobbly-card wobbly-card-white tape-decoration rotate-n1 auth-card">
        <div class="auth-card-header">
          <div class="auth-card-icon" style="background: #192a57">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
              stroke="white" stroke-width="2">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
          </div>
          <h1 class="auth-title">Admin Login</h1>
          <p class="auth-subtitle">Welcome back to SchoolMap!</p>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)" class="auth-form">
          <div class="field-group">
            <label for="login-identifier" class="field-label">Email or Username</label>
            <input type="text" id="login-identifier" class="wobbly-input" placeholder="your@email.edu or username"
              required />
          </div>
          <div class="field-group" style="position: relative">
            <label for="login-password" class="field-label">Password</label>
            <input type="password" id="login-password" class="wobbly-input" placeholder="Enter your password"
              required />
            <button type="button" class="pw-toggle" onclick="togglePasswordVisibility('login-password', this)">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div id="login-error" class="error-box" style="display: none"></div>
          <button type="submit" id="login-submit" class="wobbly-btn wobbly-btn-primary w-full">
            Sign In
          </button>
        </form>
        </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" style="display: none"></div>

  <script src="../assets/js/core.js?v=20260510-0915"></script>
  <script src="../assets/js/login.js?v=20260510-0915"></script>
</body>

</html>
